    - article [ref=e18]:
      - paragraph [ref=e19]: 本页面提供 OpenClaw 微信插件的整体架构概览，帮助开发者快速理解项目结构、核心功能模块及各组件之间的关系。OpenClaw 微信插件是一个基于 HTTP JSON API 的微信渠道插件，支持通过扫码完成登录授权，实现与微信生态的无缝对接。
      - heading "项目定位" [level=2] [ref=e20]:
        - link "项目定位" [ref=e21] [cursor=pointer]:
          - /url: "#/?id=%e9%a1%b9%e7%9b%ae%e5%ae%9a%e4%bd%8d"
      - paragraph [ref=e22]:
        - text: OpenClaw 微信插件是 OpenClaw 生态系统的官方微信渠道组件，旨在为开发者提供稳定、高效的微信集成方案。插件采用长轮询（long-polling）机制获取消息，通过
        - code [ref=e23]: sendMessage
        - text: API 发送消息，并完整支持文本、图片、视频、文件等多种媒体类型的上传与下载。插件内置了
        - strong [ref=e24]: 多账号管理
        - text: 、
        - strong [ref=e25]: 会话状态保持
        - text: 、
        - strong [ref=e26]: SILK 语音转码
        - text: 、
        - strong [ref=e27]: AES-128-ECB 加密
        - text: 等企业级特性，适用于生产环境部署。
      - paragraph [ref=e28]:
        - text: 当前版本为
        - strong [ref=e29]: 2.1.7
        - text: ，要求 Node.js >=22，并与 OpenClaw 2026.3.22+ 版本完全兼容。插件在启动时会执行版本兼容性检查，如果运行的 OpenClaw 版本超出支持范围，插件将拒绝加载。
