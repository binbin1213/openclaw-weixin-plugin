          - text: "CDN 上传 User->>Weixin: 发送消息 Weixin->>API: getUpdates 长轮询 API->>Monitor: 返回消息列表 + 同步游标 Monitor->>Process: 路由消息 Process->>Process: 下载媒体（如需） Process->>Process: 解析命令 / Markdown Process->>Send: 生成响应 alt 媒体消息 Send->>API: getUploadUrl 获取预签名 URL API->>Send: 返回上传参数 Send->>CDN: 上传加密文件 CDN->>Send: 返回下载参数 Send->>API: sendMessage（含媒体） else 文本消息 Send->>API: sendMessage end API->>Weixin: 发送消息到微信 Weixin->>User: 接收响应 Monitor->>Monitor: 保存同步游标"
        - text: mermaid
      - paragraph [ref=e218]: 该流程体现了插件的高效性：通过长轮询减少轮询开销，通过同步游标保证消息不丢失，通过 CDN 预签名 URL 实现安全的媒体上传，通过上下文令牌缓存优化消息发送性能。
